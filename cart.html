<!DOCTYPE html><html lang="id">
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Keranjang Hey Matcha</title><style>

body{
font-family:Arial;
margin:0;

/* BACKGROUND FOTO */

background:
linear-gradient(rgba(0,0,0,0.4),rgba(0,0,0,0.4)),
url("bg.png");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* HEADER */

header{
background:#2e7d32;
color:white;
padding:20px;
text-align:center;
}

/* CONTAINER */

.container{
max-width:600px;
margin:40px auto;
padding:20px;
}

/* ITEM */

.item{
background:rgba(255,255,255,0.95);
padding:15px;
margin-bottom:10px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

/* TOTAL */

.total{
font-size:20px;
font-weight:bold;
margin-top:20px;
color:white;
}

/* PAYMENT BOX */

.payment{
background:rgba(255,255,255,0.95);
padding:20px;
margin-top:20px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
text-align:center;
}

.qris-img{
width:220px;
margin-top:10px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}

/* BUTTON */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.checkout{
background:#25D366;
color:white;
}

.clear{
background:#f44336;
color:white;
}

button:hover{
opacity:0.9;
}

</style></head><body><header>
<h1>Keranjang Belanja 🛒</h1>
</header><div class="container"><div id="cartItems"></div><div class="total" id="totalPrice"></div><!-- PEMBAYARAN TRANSFER --><div class="payment"><h3>Pembayaran Transfer</h3><p><b>Bank BCA</b></p><p style="font-size:20px;"><b>8771003648</b></p><p>a.n <b>ADITYA SURYA PRAWIRA MULYA</b></p><p>Silakan transfer sesuai total pesanan</p></div><!-- PEMBAYARAN QRIS --><div class="payment"><h3>Atau Bayar via QRIS</h3><p>Scan QR di bawah ini</p><img src="qris.jpg" class="qris-img"></div><button class="checkout" onclick="checkout()">
Saya Sudah Bayar → Kirim ke WhatsApp
</button><button class="clear" onclick="clearCart()">
Hapus Keranjang
</button></div><script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let cartDiv = document.getElementById("cartItems");

let total = 0;

cart.forEach(item => {

cartDiv.innerHTML +=
"<div class='item'>"+item.name+" - Rp"+item.price+"</div>";

total += item.price;

});

document.getElementById("totalPrice").innerText =
"Total: Rp"+total;

function checkout(){

let text = "Halo saya sudah melakukan pembayaran.%0A%0APesanan:%0A";

cart.forEach(item=>{
text += "- "+item.name+" Rp"+item.price+"%0A";
});

text += "%0ATotal Rp"+total+"%0A%0ABukti pembayaran akan saya kirim.";

window.open(
"https://wa.me/62881024784926?text="+text
);

}

function clearCart(){

localStorage.removeItem("cart");

location.reload();

}

</script></body>
</html>
