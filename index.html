                                                                                                                                                    ]<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey Matcha</title>

<link rel="stylesheet" href="https://unpkg.com/aos@2.3.1/dist/aos.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f8f3;
}

header{
background:#2e7d32;
color:white;
text-align:center;
padding:25px;
}

.container{
padding:20px;
}

.menu{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
overflow:hidden;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.price{
color:#2e7d32;
font-weight:bold;
}

button{
background:#2e7d32;
color:white;
border:none;
padding:10px;
margin:5px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1b5e20;
}

.gofood{
background:#ff5722;
}

.cart{
position:fixed;
bottom:20px;
right:20px;
background:#2e7d32;
color:white;
padding:15px;
border-radius:10px;
}

#promo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
z-index:999;
}

.promo-box{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
}

</style>

</head>

<body>

<header>

<h1>Hey Matcha 🍵</h1>

<p>Premium Matcha Cikande</p>

<button class="gofood" onclick="gofood()">
Pesan via GoFood
</button>

<button onclick="dashboard()">
Dashboard
</button>

</header>

<div class="container">

<div class="menu">

<div class="card" data-aos="zoom-in">

<img src="1.png">

<h3>Signature Matcha</h3>

<p class="price">Rp12.000</p>

<button onclick="addCart('Signature Matcha',12000)">
Tambah Keranjang
</button>

<button onclick="orderWA('Signature Matcha')">
Pesan WA
</button>

</div>


<div class="card" data-aos="zoom-in">

<img src="2.png">

<h3>Caramelo Matcha</h3>

<p class="price">Rp14.000</p>

<button onclick="addCart('Caramelo Matcha',14000)">
Tambah Keranjang
</button>

<button onclick="orderWA('Caramelo Matcha')">
Pesan WA
</button>

</div>


<div class="card" data-aos="zoom-in">

<img src="3.png">

<h3>Cookies Matcha</h3>

<p class="price">Rp14.000</p>

<button onclick="addCart('Cookies Matcha',14000)">
Tambah Keranjang
</button>

<button onclick="orderWA('Cookies Matcha')">
Pesan WA
</button>

</div>


<div class="card" data-aos="zoom-in">

<img src="4.png">

<h3>Yoghurt Matcha</h3>

<p class="price">Rp16.000</p>

<button onclick="addCart('Yoghurt Matcha',16000)">
Tambah Keranjang
</button>

<button onclick="orderWA('Yoghurt Matcha')">
Pesan WA
</button>

</div>


<div class="card" data-aos="zoom-in">

<img src="5.png">

<h3>Lemonade Matcha</h3>

<p class="price">Rp12.000</p>

<button onclick="addCart('Lemonade Matcha',12000)">
Tambah Keranjang
</button>

<button onclick="orderWA('Lemonade Matcha')">
Pesan WA
</button>

</div>

</div>

</div>


<div class="cart">

Keranjang: <span id="jumlah">0</span>

<br><br>

<button onclick="checkout()">Checkout</button>

</div>


<div style="padding:20px">

<h2>Bayar QRIS</h2>

<img src="qris.png" width="200">

</div>


<div style="padding:20px">

<h2>Lokasi Toko</h2>

<iframe
width="100%"
height="300"
style="border:0"
loading="lazy"
src="https://maps.google.com/maps?q=Cikande&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>

</div>


<div id="promo">

<div class="promo-box">

<h2>Promo Hari Ini 🍵</h2>

<p>Diskon 10% Signature Matcha</p>

<button onclick="closePromo()">Tutup</button>

</div>

</div>



<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

<script>

AOS.init();

let cart=[];

let klikWA=localStorage.getItem("klikWA")||0;
let klikGO=localStorage.getItem("klikGO")||0;

function addCart(nama,harga){

cart.push({nama,harga});

document.getElementById("jumlah").innerText=cart.length;

alert(nama+" ditambahkan");

}

function checkout(){

if(cart.length==0){

alert("Keranjang kosong");

return;

}

let pesan="Halo Hey Matcha 🍵%0A%0ASaya pesan:%0A";

let total=0;

cart.forEach(item=>{

pesan+=item.nama+"%0A";

total+=item.harga;

});

pesan+="%0ATotal: Rp"+total;

window.open("https://wa.me/62881024784926?text="+pesan);

}

function orderWA(menu){

klikWA++;

localStorage.setItem("klikWA",klikWA);

let pesan="Halo saya mau pesan "+menu;

window.open("https://wa.me/62881024784926?text="+pesan);

}

function gofood(){

klikGO++;

localStorage.setItem("klikGO",klikGO);

window.open("https://gofood.link/a/SjiDGzA");

}

function dashboard(){

alert("Klik WA: "+klikWA+" | Klik GoFood: "+klikGO);

}

function closePromo(){

document.getElementById("promo").style.display="none";

}

</script>

</body>
    </html>
