<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hey Matcha</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f8f3;
}

header{
    background:#2e7d32;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    padding:20px;
}

.menu{
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.card{
    background:white;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    overflow:hidden;
    text-align:center;
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    margin:10px 0 5px;
}

.price{
    color:#2e7d32;
    font-weight:bold;
    margin-bottom:10px;
}

button{
    background:#2e7d32;
    color:white;
    border:none;
    padding:10px;
    margin-bottom:15px;
    border-radius:6px;
    cursor:pointer;
    width:80%;
}

button:hover{
    background:#1b5e20;
}
</style>
</head>

<body>

<header>
<h1>Hey Matcha 🍵</h1>
<p>100% Pure Matcha</p>
</header>

<div class="container">
<div class="menu">

<div class="card">
<img src="signature.jpg">
<h3>Signature Matcha</h3>
<p class="price">Rp 12.000</p>
<button onclick="order('Signature Matcha - 12K')">Pesan</button>
</div>

<div class="card">
<img src="caramelo.jpg">
<h3>Caramelo Matcha</h3>
<p class="price">Rp 14.000</p>
<button onclick="order('Caramelo Matcha - 14K')">Pesan</button>
</div>

<div class="card">
<img src="cookies.jpg">
<h3>Cookies Matcha</h3>
<p class="price">Rp 14.000</p>
<button onclick="order('Cookies Matcha - 14K')">Pesan</button>
</div>

<div class="card">
<img src="yoghurt.jpg">
<h3>Yoghurt Matcha</h3>
<p class="price">Rp 16.000</p>
<button onclick="order('Yoghurt Matcha - 16K')">Pesan</button>
</div>

<div class="card">
<img src="lemonade.jpg">
<h3>Lemonade Matcha</h3>
<p class="price">Rp 12.000</p>
<button onclick="order('Lemonade Matcha - 12K')">Pesan</button>
</div>

</div>
</div>

<script>
function order(menu){
    let nomorWA = "6281234567890"; // GANTI NOMOR WA KAMU
    let pesan = "Halo Hey Matcha 🍵%0ASaya mau pesan:%0A" + menu;
    window.open("https://wa.me/" + nomorWA + "?text=" + pesan);
}
</script>

</body>
</html>
